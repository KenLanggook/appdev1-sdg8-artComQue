<div class="login-container">
  <div class="video-section">
    <video class="top-video" autoplay muted loop playsinline>
      <source src="UBaguio.mp4" type="video/mp4">
    </video>
    <div class="video-overlay">
      <h1>University of Baguio</h1>
      <p>Incident Report System</p>
    </div>
  </div>
  
  <div class="login-section">
    <div class="login-overlay">
    <div class="login-card">
      <div class="login-header">
        <div class="ub-logo">
          <h1>University of Baguio</h1>
          <p>Incident Report System</p>
        </div>
        <h2>Login to Your Account</h2>
      </div>

      <form class="login-form" (ngSubmit)="onLogin()">
        <div class="form-group">
          <label for="username">Username</label>
          <input 
            type="text" 
            id="username" 
            [(ngModel)]="loginData.username" 
            name="username"
            placeholder="Enter your username"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-input">
            <input 
              [type]="showPassword ? 'text' : 'password'" 
              id="password" 
              [(ngModel)]="loginData.password" 
              name="password"
              placeholder="Enter your password"
              required
            >
            <button type="button" class="toggle-password" (click)="togglePassword()">
              {{ showPassword ? 'Hide' : 'Show' }}
            </button>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" [disabled]="isLoading">
            {{ isLoading ? 'Logging in...' : 'Login' }}
          </button>
        </div>

        <div class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>
      </form>

      <div class="login-footer">
        <p>Don't have an account? <a href="javascript:void(0)" (click)="goToRegister()">Register here</a></p>
      </div>
    </div>
  </div>
</div>
