<div class="register-container">
  <div class="register-card">
    <div class="register-header">
      <div class="ub-logo">
        <h1>University of Baguio</h1>
        <p>Incident Report System</p>
      </div>
      <h2>Create Your Account</h2>
    </div>

    <form class="register-form" (ngSubmit)="onRegister()">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name *</label>
          <input 
            type="text" 
            id="firstName" 
            [(ngModel)]="registerData.firstName" 
            name="firstName"
            placeholder="Enter your first name"
            required
          >
        </div>
        <div class="form-group">
          <label for="lastName">Last Name *</label>
          <input 
            type="text" 
            id="lastName" 
            [(ngModel)]="registerData.lastName" 
            name="lastName"
            placeholder="Enter your last name"
            required
          >
        </div>
      </div>

      <div class="form-group">
        <label for="username">Username *</label>
        <input 
          type="text" 
          id="username" 
          [(ngModel)]="registerData.username" 
          name="username"
          placeholder="Choose a username"
          required
        >
      </div>

      <div class="form-group">
        <label for="email">Email Address *</label>
        <input 
          type="email" 
          id="email" 
          [(ngModel)]="registerData.email" 
          name="email"
          placeholder="Enter your email"
          required
        >
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="password">Password *</label>
          <div class="password-input">
            <input 
              [type]="showPassword ? 'text' : 'password'" 
              id="password" 
              [(ngModel)]="registerData.password" 
              name="password"
              placeholder="Create a password"
              required
            >
            <button type="button" class="toggle-password" (click)="togglePassword()">
              {{ showPassword ? 'Hide' : 'Show' }}
            </button>
          </div>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password *</label>
          <div class="password-input">
            <input 
              [type]="showConfirmPassword ? 'text' : 'password'" 
              id="confirmPassword" 
              [(ngModel)]="registerData.confirmPassword" 
              name="confirmPassword"
              placeholder="Confirm your password"
              required
            >
            <button type="button" class="toggle-password" (click)="toggleConfirmPassword()">
              {{ showConfirmPassword ? 'Hide' : 'Show' }}
            </button>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input 
          type="tel" 
          id="phone" 
          [(ngModel)]="registerData.phone" 
          name="phone"
          placeholder="+63-XXX-XXX-XXXX"
        >
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="studentId">Student ID (Optional)</label>
          <input 
            type="text" 
            id="studentId" 
            [(ngModel)]="registerData.studentId" 
            name="studentId"
            placeholder="e.g., 2024-12345"
          >
        </div>
        <div class="form-group">
          <label for="department">Department (Optional)</label>
          <input 
            type="text" 
            id="department" 
            [(ngModel)]="registerData.department" 
            name="department"
            placeholder="e.g., College of Engineering"
          >
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" [disabled]="isLoading">
          {{ isLoading ? 'Creating Account...' : 'Create Account' }}
        </button>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <div class="success-message" *ngIf="successMessage">
        {{ successMessage }}
      </div>
    </form>

    <div class="register-footer">
      <p>Already have an account? <a href="javascript:void(0)" (click)="goToLogin()">Login here</a></p>
    </div>
  </div>
</div>
