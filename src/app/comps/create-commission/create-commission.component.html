<div class="create-commission-page">
  <div class="page-header">
    <h2>Create New Commission</h2>
    <p>Fill in the details to create a new art commission</p>
  </div>

  <form class="commission-form" (ngSubmit)="onSubmit()">
    <div class="form-section">
      <h3>Basic Information</h3>
      
      <div class="form-group">
        <label for="title">Commission Title *</label>
        <input 
          type="text" 
          id="title" 
          [(ngModel)]="newCommission.title" 
          name="title"
          required
          placeholder="Enter commission title"
        >
      </div>

      <div class="form-group">
        <label for="description">Description *</label>
        <textarea 
          id="description" 
          [(ngModel)]="newCommission.description" 
          name="description"
          required
          rows="4"
          placeholder="Describe the commission requirements"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="specifications">Specifications</label>
        <textarea 
          id="specifications" 
          [(ngModel)]="newCommission.specifications" 
          name="specifications"
          rows="3"
          placeholder="Detailed specifications, requirements, etc."
        ></textarea>
      </div>
    </div>

    <div class="form-section">
      <h3>Client Information</h3>
      
      <div class="form-group">
        <label for="clientId">Select Client *</label>
        <select 
          id="clientId" 
          [(ngModel)]="newCommission.clientId" 
          name="clientId"
          (change)="onClientChange()"
          required
        >
          <option value="">Choose a client...</option>
          <option *ngFor="let client of clients" [value]="client.id">
            {{ client.name }} {{ client.company ? `(${client.company})` : '' }}
          </option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="clientName">Client Name</label>
          <input 
            type="text" 
            id="clientName" 
            [(ngModel)]="newCommission.clientName" 
            name="clientName"
            readonly
            placeholder="Auto-filled from client selection"
          >
        </div>

        <div class="form-group">
          <label for="clientEmail">Client Email</label>
          <input 
            type="email" 
            id="clientEmail" 
            [(ngModel)]="newCommission.clientEmail" 
            name="clientEmail"
            readonly
            placeholder="Auto-filled from client selection"
          >
        </div>
      </div>
    </div>

    <div class="form-section">
      <h3>Commission Details</h3>
      
      <div class="form-row">
        <div class="form-group">
          <label for="artworkType">Artwork Type *</label>
          <select 
            id="artworkType" 
            [(ngModel)]="newCommission.artworkType" 
            name="artworkType"
            required
          >
            <option *ngFor="let type of artworkTypes" [value]="type">
              {{ type.replace('_', ' ').toUpperCase() }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <label for="priority">Priority</label>
          <select 
            id="priority" 
            [(ngModel)]="newCommission.priority" 
            name="priority"
          >
            <option *ngFor="let priority of priorities" [value]="priority">
              {{ priority.toUpperCase() }}
            </option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="price">Price ($) *</label>
          <input 
            type="number" 
            id="price" 
            [(ngModel)]="newCommission.price" 
            name="price"
            required
            min="0"
            step="0.01"
            placeholder="0.00"
          >
        </div>

        <div class="form-group">
          <label for="deadline">Deadline *</label>
          <input 
            type="date" 
            id="deadline" 
            [(ngModel)]="newCommission.deadline" 
            name="deadline"
            required
          >
        </div>
      </div>

      <div class="form-group">
        <label for="status">Initial Status</label>
        <select 
          id="status" 
          [(ngModel)]="newCommission.status" 
          name="status"
        >
          <option *ngFor="let status of statusValues" [value]="status">
            {{ status.replace('_', ' ').toUpperCase() }}
          </option>
        </select>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="!validateForm()">
        Create Commission
      </button>
      <button type="button" class="btn btn-secondary" (click)="cancel()">
        Cancel
      </button>
    </div>
  </form>
</div>
